<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>メンズ脱毛JAPAN 予約</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --blue: #2563eb;
      --ink: #172033;
      --muted: #667085;
      --panel: #ffffff;
      --bg: #f4f7fd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    main {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: max(32px, env(safe-area-inset-top)) 18px 40px;
    }
    .brand {
      color: var(--blue);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .02em;
    }
    h1 {
      margin: 12px 0 8px;
      font-size: 30px;
      line-height: 1.35;
    }
    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.75;
    }
    .card {
      margin-top: 28px;
      padding: 24px 20px;
      border: 1px solid #e4e7ec;
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 12px 30px rgba(35, 55, 90, .08);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #ecfdf3;
      color: #027a48;
      font-size: 14px;
      font-weight: 900;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #12b76a;
    }
    .card h2 {
      margin: 18px 0 8px;
      font-size: 22px;
    }
    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }
    .login-button {
      width: 100%;
      min-height: 58px;
      margin-top: 20px;
      border: 0;
      border-radius: 15px;
      background: #06c755;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
    }
    .login-button[hidden] { display: none; }
    .profile {
      display: none;
      margin-top: 20px;
      padding: 16px;
      border-radius: 15px;
      background: #f0fdf4;
    }
    .profile.is-visible { display: block; }
    .profile-label {
      color: #027a48;
      font-size: 13px;
      font-weight: 900;
    }
    .profile-name {
      margin-top: 5px;
      font-size: 21px;
      font-weight: 900;
    }
    .error {
      display: none;
      margin-top: 16px;
      color: #b42318;
      font-size: 14px;
      line-height: 1.6;
    }
    .error.is-visible { display: block; }
    .progress {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">メンズ脱毛 JAPAN</div>
    <h1>お客様用予約ページ</h1>
    <p class="lead">予約・次回予約の確認・日時変更・キャンセルを、こちらから行えるようになります。</p>

    <section class="card">
      <div class="status"><span class="dot"></span>限定ログインテスト</div>
      <h2>LINEアカウントで確認</h2>
      <p>LINEログインの接続だけを確認します。まだ予約やお客様情報の登録は行われません。</p>
      <button id="loginButton" class="login-button" type="button" hidden>LINEでログイン</button>
      <div id="progress" class="progress">LINEとの接続を確認しています…</div>
      <div id="profile" class="profile">
        <div class="profile-label">LINEログイン成功</div>
        <div id="profileName" class="profile-name"></div>
      </div>
      <div id="error" class="error"></div>
    </section>
  </main>
  <script>
    const LIFF_ID = '2010784641-JegLxj1v';

    function showError(message) {
      const error = document.getElementById('error');
      error.textContent = message;
      error.classList.add('is-visible');
      document.getElementById('progress').textContent = '';
    }

    function setProgress(message) {
      document.getElementById('progress').textContent = message;
    }

    async function startLiff() {
      try {
        setProgress('LINEを初期化しています…');
        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        if (!liff.isLoggedIn()) {
          setProgress('LINEログインが必要です');
          const button = document.getElementById('loginButton');
          button.hidden = false;
          button.addEventListener('click', function() {
            liff.login({ redirectUri: window.location.href });
          });
          return;
        }

        setProgress('LINEプロフィールを確認しています…');
        const profile = await liff.getProfile();
        document.getElementById('profileName').textContent =
          String(profile.displayName || '') + ' さん';
        document.getElementById('profile').classList.add('is-visible');
        setProgress('');
      } catch (error) {
        const detail = error && error.message ? String(error.message) : String(error || '不明なエラー');
        showError('LINEログインの確認に失敗しました：' + detail);
      }
    }

    startLiff();
  </script>
</body>
</html>
